<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-more</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome（Instagramアイコン用） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="logo" href="index.html">T-more</a>
            <nav class="nav">
                <a href="menu.html">Menu</a>
                <a href="access.html">Access</a>
            </nav>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <p class="hero-eyebrow">Shisha bar</p>
            <h1>T-more</h1>
            <p>カジュアルに楽しめるシーシャバー</p>
            <p class="price">２時間 3,000~4,000円</p>
        </div>
    </section>

    <!-- Concept -->
    <section class="concept">
    <h2>Concept</h2>
    <p>
        仕事終わりにふらっと立ち寄れる、
        シーシャ好きのためのシーシャバー。
    </p>
    </section>

    <!-- Gallery -->
    <section class="gallery">
    <h2>Gallery</h2>
    <div class="gallery-grid">
        <img src="images/hero.jpg" alt="店内写真">
        <img src="images/shisha.jpg" alt="シーシャ写真">
        <img src="images/counter.jpg" alt="カウンター">
    </div>
    </section>

    <!-- Access -->
    <section class="access">
        <h2>Access</h2>
        <div class="access-card">
            <div class="access-row">
                <span class="label">住所</span>
                <span class="value">神奈川県横浜市鶴見区生麦3丁目2-26 いい友ビル2F</span>
            </div>
        
            <div class="access-row">
                <span class="label">最寄駅</span>
                <span class="value">生麦駅 徒歩1分</span>
            </div>

            <div class="access-row">
                <span class="label">営業時間</span>
                <span class="value">
                    火〜木・日：17:00〜23:00<br>
                    <span class="indent">金〜土：17:00〜翌5:00</span> 
                </span>
            </div>

            <div class="access-row">
                <span class="label">定休日</span>
                <span class="value">月曜日</span>
            </div>

            <div class="access-row">
                <span class="label">支払い方法</span>
                <span class="value">現金 / クレジットカード / 各種QR決済</span>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-inner">
            <a href="https://www.instagram.com/アカウント名/"
                target="_blank"
                rel="noopener noreferrer"
                class="sns-icon">
                <i class="fa-brands fa-instagram"></i>
            </a>

        <p>&copy; 2026 Shisha Bar Sample</p>
        </div>
    </footer>

</body>
</html>
